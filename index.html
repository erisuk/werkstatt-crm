<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Werkstatt Digital · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14; --panel:#121723; --panel2:#1a2130; --line:#232c3f;
  --text:#e8ecf4; --dim:#8a94a8; --accent:#4f8cff; --accent2:#7c5cff;
  --green:#34d399; --yellow:#fbbf24; --orange:#fb923c; --red:#f87171; --pink:#f472b6;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;font-size:15px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:var(--text)}
::placeholder{color:#5a6478}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{width:min(360px,90vw);text-align:center}
#login h1{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
#login h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
#login p{color:var(--dim);font-size:13px;margin-bottom:22px}
#login input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;font-size:16px;outline:none;text-align:center}
#login input:focus{border-color:var(--accent)}
#login button{width:100%;margin-top:12px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:var(--r);padding:14px;font-weight:700;font-size:15px;color:#fff}
#login .err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}

/* ---------- Header ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(11,14,20,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 16px}
.hrow{display:flex;align-items:center;gap:12px;max-width:1300px;margin:0 auto}
.logo{font-weight:800;font-size:15px;letter-spacing:-.3px;white-space:nowrap}
.logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
#search{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:14px;outline:none;min-width:0}
#search:focus{border-color:var(--accent)}
.tabs{display:flex;gap:4px;max-width:1300px;margin:10px auto 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--dim);white-space:nowrap}
.tab.on{background:var(--panel2);color:var(--text)}
.tab .n{font-size:11px;opacity:.7;margin-left:4px}

/* ---------- Layout ---------- */
main{max-width:1300px;margin:0 auto;padding:16px}
.sec-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin:18px 0 10px}
.empty{color:var(--dim);text-align:center;padding:60px 20px;font-size:14px;line-height:1.7}

/* ---------- Cards ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#34405c}
.card .top{display:flex;align-items:flex-start;gap:10px}
.score{flex-shrink:0;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.s-hi{background:rgba(52,211,153,.14);color:var(--green)}
.s-mid{background:rgba(251,191,36,.13);color:var(--yellow)}
.s-lo{background:rgba(138,148,168,.12);color:var(--dim)}
.card .name{font-weight:600;font-size:14.5px;line-height:1.35}
.card .sub{color:var(--dim);font-size:12.5px;margin-top:3px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--panel2);color:var(--dim)}
.chip.b143{background:rgba(124,92,255,.16);color:#a78bfa}
.chip.warm{background:rgba(251,146,60,.15);color:var(--orange)}
.callbtn{margin-left:auto;flex-shrink:0;background:rgba(52,211,153,.12);color:var(--green);border-radius:10px;padding:8px 13px;font-weight:700;font-size:13px;text-decoration:none;display:flex;align-items:center;gap:5px}

/* ---------- Pipeline ---------- */
#pipeline{display:flex;gap:12px;overflow-x:auto;padding-bottom:20px;align-items:flex-start;scroll-snap-type:x proximity}
.col{min-width:270px;width:270px;flex-shrink:0;scroll-snap-align:start}
.col h3{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:8px 4px;display:flex;align-items:center;gap:7px;position:sticky;top:0}
.col h3 .dot{width:8px;height:8px;border-radius:99px}
.col h3 .cnt{color:var(--dim);font-weight:600;margin-left:auto}
.col .cards{min-height:40px}
.col .card{padding:12px}

/* ---------- Modal ---------- */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:none}
#modal{position:fixed;z-index:70;inset:auto 0 0 0;max-height:92vh;background:var(--panel);border-radius:20px 20px 0 0;border:1px solid var(--line);overflow-y:auto;display:none;overscroll-behavior:contain}
@media(min-width:760px){#modal{inset:4vh 0 auto 0;margin:0 auto;width:min(680px,94vw);border-radius:20px;max-height:88vh}}
#modal .inner{padding:22px 20px 40px}
#modal .close{position:absolute;top:14px;right:14px;background:var(--panel2);border-radius:99px;width:34px;height:34px;font-size:16px;color:var(--dim)}
#modal h2{font-size:19px;font-weight:800;letter-spacing:-.3px;line-height:1.3;padding-right:44px}
#modal .meta{color:var(--dim);font-size:13px;margin-top:5px;line-height:1.6}
.statusrow{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}
.statusbtn{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;background:var(--panel2);color:var(--dim);border:1px solid transparent}
.statusbtn.on{color:#fff;border-color:currentColor}
.fieldgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
@media(max-width:520px){.fieldgrid{grid-template-columns:1fr}}
.fieldgrid label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);display:block;margin-bottom:4px}
.fieldgrid input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;outline:none}
.fieldgrid input:focus{border-color:var(--accent)}
.actions{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.abtn{flex:1;min-width:130px;text-align:center;padding:12px;border-radius:11px;font-weight:700;font-size:13.5px;text-decoration:none}
.abtn.call{background:rgba(52,211,153,.13);color:var(--green)}
.abtn.mail{background:rgba(79,140,255,.13);color:var(--accent)}
.abtn.save{background:var(--panel2);color:var(--text)}
.notes{margin-top:16px}
.note{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:7px;line-height:1.55}
.note .d{color:var(--dim);font-size:11px;font-weight:700;margin-bottom:2px}
.addnote{display:flex;gap:8px;margin-top:10px}
.addnote input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;outline:none}
.addnote input:focus{border-color:var(--accent)}
.addnote button{background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;padding:0 18px;font-weight:700;color:#fff}
details.mailtpl{margin-top:18px;background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden}
details.mailtpl summary{padding:13px 14px;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--accent);list-style:none}
details.mailtpl pre{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.6;padding:0 14px 14px;color:var(--dim)}
.copybtn{margin:0 14px 14px;background:var(--panel2);border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 22px;font-weight:600;font-size:14px;z-index:90;display:none}

/* ---------- Motivations-Hero ---------- */
.hero{background:linear-gradient(135deg,#1a2130,#1d1730);border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:8px;position:relative;overflow:hidden}
.hero .spruch{font-size:15px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:16px}
.hero-grid{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.ring{position:relative;width:104px;height:104px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .mid .big{font-size:26px;font-weight:800;line-height:1;letter-spacing:-1px}
.ring .mid .lbl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;margin-top:2px}
.hero-stats{flex:1;min-width:180px;display:flex;flex-direction:column;gap:10px}
.hs-row{display:flex;align-items:center;gap:10px}
.hs-emoji{font-size:26px;width:36px;text-align:center}
.hs-txt .v{font-size:18px;font-weight:800;letter-spacing:-.3px}
.hs-txt .l{font-size:11px;color:var(--dim);font-weight:600}
.rankbar{height:7px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:5px}
.rankbar div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px}

/* ---------- Konfetti ---------- */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;display:none}
.cf{position:absolute;width:11px;height:11px;top:-20px;will-change:transform,opacity;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}
#winbanner{position:fixed;top:30%;left:50%;transform:translateX(-50%) scale(.6);background:linear-gradient(135deg,#16a34a,#34d399);color:#fff;padding:22px 34px;border-radius:18px;font-weight:800;font-size:22px;z-index:201;display:none;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#winbanner.show{display:block;animation:pop .5s cubic-bezier(.2,1.4,.4,1) forwards}
@keyframes pop{to{transform:translateX(-50%) scale(1)}}

/* ---------- Call-Modus ---------- */
#callmode{position:fixed;inset:0;background:var(--bg);z-index:80;display:none;overflow-y:auto}
#callmode .cm-inner{max-width:640px;margin:0 auto;padding:18px 16px 60px}
.cm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cm-count{font-weight:800;font-size:14px;color:var(--dim)}
.cm-count b{color:var(--text)}
.cm-exit{background:var(--panel2);border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;color:var(--dim)}
.cm-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}
.cm-name{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.25}
.cm-sub{color:var(--dim);font-size:14px;margin-top:6px;line-height:1.6}
.cm-tel{display:block;text-align:center;background:linear-gradient(90deg,#16a34a,#34d399);color:#fff;border-radius:14px;padding:18px;font-size:20px;font-weight:800;text-decoration:none;margin:18px 0 10px}
.cm-log{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cm-log button{padding:14px;border-radius:12px;font-weight:700;font-size:14px;background:var(--panel2)}
.cm-log .b-no{color:var(--red)}.cm-log .b-ab{color:var(--yellow)}
.cm-log .b-talk{color:var(--accent)}.cm-log .b-win{background:rgba(52,211,153,.15);color:var(--green)}
.cm-skip{width:100%;margin-top:8px;padding:11px;border-radius:11px;color:var(--dim);font-weight:700;background:var(--panel)}
.cm-note{width:100%;margin-top:10px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;outline:none}
details.cm-script{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
details.cm-script summary{padding:14px;font-weight:800;font-size:14px;cursor:pointer;color:var(--yellow);list-style:none}
details.cm-script .s-body{padding:0 16px 16px;font-size:13.5px;line-height:1.75;color:var(--dim)}
details.cm-script .s-body b{color:var(--text)}
details.cm-script .s-body .q{color:var(--text);font-weight:600}
.cm-done{text-align:center;padding:80px 20px}
.cm-done .big{font-size:48px}
.cm-done h2{font-size:20px;font-weight:800;margin:14px 0 8px}
.cm-done p{color:var(--dim);font-size:14px;line-height:1.7}
#whoami{color:var(--dim);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:99px;animation:sp 1s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h1>WERKSTATT <span>DIGITAL</span></h1>
    <p>Team-CRM · 154 Werkstätten · live geteilt<br>Neu im Team? Schlüssel vom Chef holen, eigenen Namen eintippen, los.</p>
    <input id="tokenInput" type="password" placeholder="Team-Schlüssel (github_pat_…)" autocomplete="current-password">
    <input id="nameInput" type="text" placeholder="Dein Name (z.B. Murat oder Eris)" style="margin-top:10px">
    <button onclick="doLogin()">Rein</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<header style="display:none" id="hdr">
  <div class="hrow">
    <div class="logo">W<span>D</span> CRM</div>
    <input id="search" placeholder="Suchen: Name, Ort, Produkt …" oninput="render()">
    <div id="whoami" onclick="logout()" title="Klick zum Abmelden"></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-v="heute" onclick="setView('heute',this)">📞 Heute<span class="n" id="n-heute"></span></button>
    <button class="tab" data-v="pipeline" onclick="setView('pipeline',this)">Pipeline</button>
    <button class="tab" data-v="liste" onclick="setView('liste',this)">Liste<span class="n" id="n-liste"></span></button>
    <button class="tab" data-v="team" onclick="setView('team',this)">📊 Dashboard</button>
    <button class="tab" style="color:var(--green);font-weight:800" onclick="startCallMode()">▶ Call-Modus</button>
  </div>
</header>

<main id="main" style="display:none"></main>

<div id="overlay" onclick="closeModal()"></div>
<div id="modal"></div>
<div id="callmode"></div>
<div id="confetti"></div>
<div id="winbanner"></div>
<div id="toast"></div>

<script>
const STATI = [
  {k:"offen",     l:"Offen",     c:"#8a94a8"},
  {k:"mail",      l:"Mail raus", c:"#4f8cff"},
  {k:"call",      l:"Angerufen", c:"#7c5cff"},
  {k:"gespraech", l:"Gespräch",  c:"#fbbf24"},
  {k:"angebot",   l:"Angebot",   c:"#fb923c"},
  {k:"pilot",     l:"PILOT 🎉",  c:"#34d399"},
  {k:"tot",       l:"Tot",       c:"#f87171"},
];
const SC = Object.fromEntries(STATI.map(s=>[s.k,s]));
let LEADS = [], VIEW = "heute";

const token = () => localStorage.getItem("crm_token") || "";
const wer   = () => localStorage.getItem("crm_name") || "";

/* Daten liegen in einem privaten GitHub-Repo (leads.json). Login = Fine-grained PAT
   mit Contents-Schreibrecht NUR auf dieses eine Repo. */
const OWNER = "muratbhh222-hub", REPO = "werkstatt-crm-data", FILE = "leads.json";
const GH = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
let SHA = null;

const ghHeaders = () => ({ authorization: "Bearer " + token(), accept: "application/vnd.github+json" });

function b64decode(b64) {
  const bin = atob(b64.replace(/\n/g, ""));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
function b64encode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  for (let i = 0; i < bytes.length; i += 8192) bin += String.fromCharCode(...bytes.subarray(i, i + 8192));
  return btoa(bin);
}

async function loadLeads() {
  const res = await fetch(GH + "?t=" + Date.now(), { headers: ghHeaders() });
  if (res.status === 401) { logout(); throw new Error("auth"); }
  if (!res.ok) throw new Error("api " + res.status);
  const j = await res.json();
  SHA = j.sha;
  return JSON.parse(b64decode(j.content));
}

const heuteStr = () => new Date().toISOString().slice(0, 10);
const stamp = () => {
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
};

/* 🤖 Automation: Statuswechsel setzt automatisch den nächsten Schritt (Wiedervorlage) */
const AUTO_WV = { mail: 2, call: 1, gespraech: 3, angebot: 3 };

function applyUpd(lead, upd) {
  const STATKEYS = STATI.map(s => s.k);
  if (upd.status && STATKEYS.includes(upd.status) && upd.status !== lead.status) {
    lead.status = upd.status;
    lead.notizen = (lead.notizen ? lead.notizen + " | " : "") + `${stamp()}: → ${upd.status}` + (upd.wer ? ` (${upd.wer})` : "");
    if (!upd.wiedervorlage && AUTO_WV[upd.status]) {
      upd.wiedervorlage = plusTage(AUTO_WV[upd.status]);
      upd._autoWV = upd.wiedervorlage;
    }
    if (upd.status === "pilot" || upd.status === "tot") upd.wiedervorlage = "";
  }
  if (upd.note) {
    lead.notizen = (lead.notizen ? lead.notizen + " | " : "") + `${stamp()}: ${upd.note}` + (upd.wer ? ` (${upd.wer})` : "");
  }
  for (const k of ["telefon", "email", "website", "ansprechpartner", "zustaendig", "wiedervorlage"]) {
    if (typeof upd[k] === "string") lead[k] = upd[k];
  }
  lead.updated = new Date().toISOString();
}

/* Aktivitäten aus allen Notizen ziehen (für Feed + Leaderboard) */
function allActivities() {
  const out = [];
  for (const l of LEADS) {
    for (const p of String(l.notizen || "").split(" | ")) {
      const m = p.match(/^(\d{4}-\d{2}-\d{2})(?:\s+(\d{2}:\d{2}))?:\s*(.*)$/s);
      if (!m) continue;
      const wm = m[3].match(/\(([^)]+)\)\s*$/);
      out.push({ date: m[1], time: m[2] || "", text: m[3].replace(/\s*\([^)]+\)\s*$/, ""), wer: wm ? wm[1] : "?", lead: l });
    }
  }
  return out.sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
}
function teamNamen() {
  const s = new Set([wer()]);
  for (const a of allActivities()) if (a.wer && a.wer !== "?") s.add(a.wer);
  for (const l of LEADS) if (l.zustaendig) s.add(l.zustaendig);
  return [...s];
}

/* ---------- Motivations-Logik ---------- */
const TAGESZIEL = 10;  // Anrufe pro Tag
const RAENGE = [
  {min:0,   name:"Frischling",  emoji:"🐣"},
  {min:5,   name:"Wählhand",    emoji:"☎️"},
  {min:20,  name:"Closer",      emoji:"🔥"},
  {min:50,  name:"Telefon-Maschine", emoji:"⚡"},
  {min:100, name:"Vertriebs-Legende", emoji:"👑"},
];
function istAnruf(a){ return /^📞/.test(a.text); }
function rang(total){
  let r = RAENGE[0], next = null;
  for (let i=0;i<RAENGE.length;i++){ if(total>=RAENGE[i].min){ r=RAENGE[i]; next=RAENGE[i+1]||null; } }
  return {r, next};
}
function streak(acts){  // aufeinanderfolgende Tage mit Aktivität, bis heute/gestern
  const tage = new Set(acts.map(a=>a.date));
  let s = 0, d = new Date();
  if (!tage.has(d.toISOString().slice(0,10))) d.setDate(d.getDate()-1); // gestern zählt noch
  while (tage.has(d.toISOString().slice(0,10))){ s++; d.setDate(d.getDate()-1); }
  return s;
}
function spruch(callsHeute, termineGesamt){
  if (termineGesamt > 0 && callsHeute >= TAGESZIEL) return "🎉 Tagesziel geknackt UND Termine im Sack. Du bist nicht zu stoppen.";
  if (callsHeute === 0) return "📞 Noch kein Anruf heute. Der erste ist der schwerste — danach läuft's. Los!";
  if (callsHeute < TAGESZIEL) return `🔥 ${callsHeute} von ${TAGESZIEL}. Du bist im Flow, dranbleiben!`;
  return "💪 Tagesziel geknackt! Jeder weitere Anruf ist purer Bonus.";
}

/* ---------- Konfetti bei Erfolg ---------- */
function celebrate(text){
  const box = document.getElementById("confetti");
  box.style.display = "block"; box.innerHTML = "";
  const farben = ["#4f8cff","#7c5cff","#34d399","#fbbf24","#f472b6","#fb923c"];
  for (let i=0;i<120;i++){
    const p = document.createElement("div");
    p.className = "cf";
    p.style.left = Math.random()*100 + "vw";
    p.style.background = farben[i%farben.length];
    p.style.animationDuration = (1.6 + Math.random()*1.4) + "s";
    p.style.animationDelay = (Math.random()*0.4) + "s";
    if (Math.random()>.5) p.style.borderRadius = "50%";
    box.appendChild(p);
  }
  const bn = document.getElementById("winbanner");
  bn.textContent = text; bn.className = "show";
  setTimeout(()=>{ box.style.display="none"; box.innerHTML=""; bn.className=""; }, 3200);
}

async function updateLead(upd) {
  for (let attempt = 0; attempt < 3; attempt++) {
    const leads = await loadLeads();          // immer frischesten Stand + SHA holen
    const lead = leads.find(l => String(l.id) === String(upd.id));
    if (!lead) throw new Error("lead not found");
    applyUpd(lead, upd);
    const res = await fetch(GH, {
      method: "PUT", headers: ghHeaders(),
      body: JSON.stringify({
        message: `CRM: #${upd.id} ${lead.name}`.slice(0, 70) + (upd.wer ? ` (${upd.wer})` : ""),
        content: b64encode(JSON.stringify(leads)),
        sha: SHA,
      }),
    });
    if (res.ok) { LEADS = leads; return lead; }
    if (res.status !== 409 && res.status !== 422) throw new Error("api " + res.status);
    // Konflikt (jemand anders hat gleichzeitig gespeichert) -> neu laden + nochmal
  }
  throw new Error("conflict");
}

async function doLogin() {
  const t = document.getElementById("tokenInput").value.trim();
  const n = document.getElementById("nameInput").value.trim();
  if (!t || !n) { document.getElementById("loginErr").textContent = "Passwort und Name eingeben"; return; }
  localStorage.setItem("crm_token", t);
  localStorage.setItem("crm_name", n);
  document.getElementById("loginErr").innerHTML = '<span class="spin"></span>';
  try { await boot(); }
  catch(e) {
    localStorage.removeItem("crm_token");
    document.getElementById("loginErr").textContent = "Falsches Passwort oder keine Verbindung";
  }
}

function logout() {
  localStorage.removeItem("crm_token");
  location.reload();
}

async function boot() {
  LEADS = await loadLeads();
  document.getElementById("login").style.display = "none";
  document.getElementById("hdr").style.display = "";
  document.getElementById("main").style.display = "";
  document.getElementById("whoami").textContent = wer() + " ·  abmelden";
  render();
}

/* ---------- Helpers ---------- */
const esc = s => String(s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const scoreCls = s => s >= 65 ? "s-hi" : s >= 45 ? "s-mid" : "s-lo";
const is143 = l => /blind|sehbehindert/i.test(l.name + " " + (l.gruende||""));
const telHref = t => "tel:" + String(t||"").replace(/[^+\d]/g,"");

function lastDate(l) {
  const m = String(l.notizen||"").match(/\d{4}-\d{2}-\d{2}/g);
  return m ? m[m.length-1] : null;
}
function wvDue(l) {
  return l.wiedervorlage && l.wiedervorlage <= heuteStr() && !["pilot","tot"].includes(l.status);
}
function daysSince(d) {
  return Math.floor((Date.now() - new Date(d).getTime()) / 864e5);
}
function warmDue(l) {
  if (l.status !== "mail") return false;
  const d = lastDate(l);
  return d && daysSince(d) >= 2;
}
function query() { return document.getElementById("search").value.trim().toLowerCase(); }
function filtered() {
  const q = query();
  if (!q) return LEADS;
  return LEADS.filter(l => (l.name+" "+l.ort+" "+l.produkte+" "+l.bundesland+" "+l.notizen).toLowerCase().includes(q));
}

/* ---------- Card ---------- */
function cardHTML(l, extra="") {
  const tel = l.telefon ? `<a class="callbtn" href="${telHref(l.telefon)}" onclick="event.stopPropagation()">📞</a>` : "";
  return `<div class="card" onclick="openModal(${l.id})">
    <div class="top">
      <div class="score ${scoreCls(l.score)}">${l.score}</div>
      <div style="min-width:0">
        <div class="name">${esc(l.name)}</div>
        <div class="sub">${esc(l.ort||"Ort unbekannt")}${l.bundesland?" · "+esc(l.bundesland):""}</div>
      </div>
      ${tel}
    </div>
    <div class="chips">
      ${is143(l) ? '<span class="chip b143">§143 legal</span>' : ""}
      ${l.zustaendig ? `<span class="chip" style="background:rgba(79,140,255,.13);color:var(--accent)">👤 ${esc(l.zustaendig)}</span>` : ""}
      ${l.wiedervorlage ? `<span class="chip ${wvDue(l)?"warm":""}">⏰ ${esc(l.wiedervorlage)}</span>` : ""}
      ${extra}
      ${(l.produkte||"").split(",").filter(Boolean).slice(0,3).map(p=>`<span class="chip">${esc(p.trim())}</span>`).join("")}
    </div>
  </div>`;
}

/* ---------- Views ---------- */
function setView(v, btn) {
  VIEW = v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t===btn));
  render();
}

function render() {
  const main = document.getElementById("main");
  const ls = filtered();
  document.getElementById("n-liste").textContent = "(" + ls.length + ")";
  const due = LEADS.filter(warmDue);
  document.getElementById("n-heute").textContent = due.length ? "(" + due.length + ")" : "";

  if (VIEW === "heute") {
    const me = wer();
    const wv = ls.filter(wvDue).sort((a,b) => (a.zustaendig===me?-1:0) - (b.zustaendig===me?-1:0) || b.score - a.score);
    const dueF = ls.filter(l => warmDue(l) && !wvDue(l));
    const aktiv = ls.filter(l => ["gespraech","angebot"].includes(l.status) && !wvDue(l));
    const calls = ls.filter(l => l.status === "call" && !wvDue(l));
    let h = "";
    if (wv.length) {
      h += `<div class="sec-title">⏰ Wiedervorlagen fällig</div>`;
      h += wv.map(l=>cardHTML(l, l.zustaendig===me ? '<span class="chip warm">DEINS</span>' : "")).join("");
    }
    h += `<div class="sec-title">🔥 Warm Calls fällig (Mail ≥ 2 Tage raus)</div>`;
    h += dueF.length ? dueF.map(l=>cardHTML(l,'<span class="chip warm">JETZT ANRUFEN</span>')).join("")
                     : `<div class="empty">Nichts fällig. Neue Mails raus → Tab "Liste", beste zuerst.</div>`;
    if (calls.length) { h += `<div class="sec-title">☎️ Angerufen, dranbleiben</div>`; h += calls.map(l=>cardHTML(l)).join(""); }
    if (aktiv.length) { h += `<div class="sec-title">💬 Gespräche & Angebote (nachfassen)</div>`; h += aktiv.map(l=>cardHTML(l)).join(""); }
    main.innerHTML = h;
  }

  if (VIEW === "team") {
    const acts = allActivities();
    const woche = new Date(Date.now() - 7*864e5).toISOString().slice(0,10);
    const counts = {};
    let termine = 0;
    for (const a of acts) {
      if (/Termin vereinbart/i.test(a.text)) termine++;
      if (a.wer === "?") continue;
      counts[a.wer] = counts[a.wer] || {heute: 0, woche: 0, gesamt: 0};
      counts[a.wer].gesamt++;
      if (a.date === heuteStr()) counts[a.wer].heute++;
      if (a.date >= woche) counts[a.wer].woche++;
    }
    const board = Object.entries(counts).sort((a,b) => b[1].heute - a[1].heute || b[1].woche - a[1].woche);

    /* --- Motivations-Hero --- */
    const me = wer();
    const meineActs = acts.filter(a=>a.wer===me);
    const callsHeute = meineActs.filter(a=>a.date===heuteStr() && istAnruf(a)).length;
    const callsGesamt = meineActs.filter(istAnruf).length;
    const myStreak = streak(meineActs);
    const {r, next} = rang(callsGesamt);
    const zielPct = Math.min(callsHeute/TAGESZIEL*100, 100);
    const C = 2*Math.PI*46, off = C - C*zielPct/100;
    const rankPct = next ? Math.min((callsGesamt-r.min)/(next.min-r.min)*100, 100) : 100;
    let h = `<div class="hero">
      <div class="spruch">${spruch(callsHeute, termine)}</div>
      <div class="hero-grid">
        <div class="ring">
          <svg width="104" height="104"><circle cx="52" cy="52" r="46" fill="none" stroke="#232c3f" stroke-width="9"/>
          <circle cx="52" cy="52" r="46" fill="none" stroke="url(#g)" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f8cff"/><stop offset="1" stop-color="#7c5cff"/></linearGradient></defs></svg>
          <div class="mid"><div class="big">${callsHeute}<span style="font-size:14px;color:var(--dim)">/${TAGESZIEL}</span></div><div class="lbl">Anrufe heute</div></div>
        </div>
        <div class="hero-stats">
          <div class="hs-row"><div class="hs-emoji">${myStreak>0?"🔥":"😴"}</div><div class="hs-txt"><div class="v">${myStreak} Tag${myStreak===1?"":"e"}</div><div class="l">Streak in Folge</div></div></div>
          <div class="hs-row"><div class="hs-emoji">${r.emoji}</div><div class="hs-txt" style="flex:1"><div class="v">${r.name}</div>
            <div class="l">${next ? `${next.min-callsGesamt} Anrufe bis ${next.emoji} ${next.name}` : "Höchster Rang erreicht!"}</div>
            <div class="rankbar"><div style="width:${rankPct}%"></div></div></div></div>
        </div>
      </div>
    </div>`;

    /* --- KPI-Reihe --- */
    const aktiv = LEADS.filter(l=>["mail","call","gespraech","angebot"].includes(l.status)).length;
    const nAngebot = LEADS.filter(l=>l.status==="angebot").length;
    const nPilot = LEADS.filter(l=>l.status==="pilot").length;
    const ohneWV = LEADS.filter(l=>["mail","call","gespraech","angebot"].includes(l.status) && !l.wiedervorlage).length;
    const heuteAkt = acts.filter(a=>a.date===heuteStr()).length;
    const kpi = (wert, label, farbe, sub="") => `
      <div style="flex:1;min-width:140px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px">
        <div style="font-size:26px;font-weight:800;color:${farbe};letter-spacing:-.5px">${wert}</div>
        <div style="font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px">${label}</div>
        ${sub?`<div style="font-size:11px;color:var(--dim);margin-top:4px">${sub}</div>`:""}
      </div>`;
    h += `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">
      ${kpi(aktiv, "Aktive Leads", "var(--accent)")}
      ${kpi(heuteAkt, "Aktionen heute", "var(--text)")}
      ${kpi(termine, "Termine vereinbart", "var(--yellow)")}
      ${kpi((nAngebot*2600).toLocaleString("de-DE")+" €", "Pipeline-Wert", "var(--orange)", nAngebot+" offene Angebote")}
      ${kpi((nPilot*7200).toLocaleString("de-DE")+" €", "Run-Rate / Jahr", "var(--green)", nPilot+" Piloten")}
    </div>`;
    if (ohneWV) h += `<div style="margin-top:10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:12px 16px;font-size:13.5px;font-weight:600;color:var(--red)">
      ⚠️ ${ohneWV} aktive Leads OHNE nächsten Schritt — im Lead die Wiedervorlage setzen!</div>`;

    /* --- Funnel --- */
    h += `<div class="sec-title">🔻 Funnel</div><div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px">`;
    const fStati = STATI.filter(s=>s.k!=="tot");
    const maxN = Math.max(...fStati.map(s=>LEADS.filter(l=>l.status===s.k).length), 1);
    h += fStati.map(s => {
      const n = LEADS.filter(l=>l.status===s.k).length;
      const w = Math.max(n/maxN*100, 2.5);
      return `<div style="display:flex;align-items:center;gap:10px;margin:7px 0">
        <div style="width:88px;font-size:12px;font-weight:700;color:var(--dim);text-align:right;flex-shrink:0">${s.l}</div>
        <div style="flex:1;height:26px;background:var(--bg);border-radius:7px;overflow:hidden">
          <div style="width:${w}%;height:100%;background:${s.c};opacity:.75;border-radius:7px"></div></div>
        <div style="width:36px;font-size:14px;font-weight:800;color:${s.c}">${n}</div>
      </div>`;
    }).join("") + `</div>`;

    /* --- Aktivität 14 Tage --- */
    const tage = [...Array(14)].map((_,i)=> new Date(Date.now()-(13-i)*864e5).toISOString().slice(0,10));
    const proTag = tage.map(t => acts.filter(a=>a.date===t).length);
    const maxT = Math.max(...proTag, 1);
    const WT = ["So","Mo","Di","Mi","Do","Fr","Sa"];
    h += `<div class="sec-title">📈 Aktivität, letzte 14 Tage</div>
      <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px">
      <div style="display:flex;align-items:flex-end;gap:5px;height:110px">` +
      tage.map((t,i) => {
        const hh = Math.max(proTag[i]/maxT*100, 3);
        const istHeute = t === heuteStr();
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end" title="${t}: ${proTag[i]}">
          ${proTag[i]?`<div style="font-size:10px;font-weight:700;color:var(--dim)">${proTag[i]}</div>`:""}
          <div style="width:100%;height:${hh}%;background:${istHeute?"linear-gradient(180deg,var(--accent),var(--accent2))":"var(--panel2)"};border-radius:5px"></div>
          <div style="font-size:9.5px;color:${istHeute?"var(--accent)":"var(--dim)"};font-weight:700">${WT[new Date(t).getDay()]}</div>
        </div>`;
      }).join("") + `</div></div>`;

    /* --- Leaderboard --- */
    h += `<div class="sec-title">🏆 Leaderboard</div>`;
    h += board.length ? board.map(([name,c],i) =>
      `<div class="card" style="cursor:default"><div class="top">
        <div class="score ${i===0?"s-hi":"s-lo"}">${["🥇","🥈","🥉"][i]||(i+1)}</div>
        <div><div class="name">${esc(name)}</div>
        <div class="sub">Heute: <b style="color:var(--text)">${c.heute}</b> · 7 Tage: <b style="color:var(--text)">${c.woche}</b> · Gesamt: ${c.gesamt}</div></div>
      </div></div>`).join("") : `<div class="empty">Noch keine Aktivität.</div>`;

    /* --- Feed --- */
    h += `<div class="sec-title">📡 Live-Feed (letzte 25 Aktionen)</div>`;
    h += acts.slice(0,25).map(a =>
      `<div class="note" style="cursor:pointer" onclick="openModal(${a.lead.id})">
        <div class="d">${a.date}${a.time?" "+a.time:""} · ${esc(a.wer)} · ${esc(a.lead.name.slice(0,45))}</div>${esc(a.text)}</div>`).join("");
    main.innerHTML = h;
  }

  if (VIEW === "pipeline") {
    main.innerHTML = `<div id="pipeline">` + STATI.map(s => {
      const col = ls.filter(l=>l.status===s.k);
      return `<div class="col">
        <h3><span class="dot" style="background:${s.c}"></span>${s.l}<span class="cnt">${col.length}</span></h3>
        <div class="cards">${col.map(l=>cardHTML(l)).join("")}</div>
      </div>`;
    }).join("") + `</div>`;
  }

  if (VIEW === "liste") {
    main.innerHTML = ls.map(l=>cardHTML(l, `<span class="chip" style="color:${SC[l.status].c}">${SC[l.status].l}</span>`)).join("")
      || `<div class="empty">Nichts gefunden.</div>`;
  }
}

function notesHTML(l) {
  const parts = String(l.notizen||"").split(" | ").filter(Boolean).reverse();
  if (!parts.length) return `<div class="note" style="color:var(--dim)">Noch keine Notizen.</div>`;
  return parts.map(p => {
    const m = p.match(/^(\d{4}-\d{2}-\d{2}(?:\s+\d{2}:\d{2})?):\s*(.*)$/s);
    return m ? `<div class="note"><div class="d">${m[1]}</div>${esc(m[2])}</div>`
             : `<div class="note">${esc(p)}</div>`;
  }).join("");
}

function closeModal() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("modal").style.display = "none";
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(()=>t.style.display="none", 1800);
}

async function setStatus(id, status) {
  try {
    const upd = {id, status, wer: wer()};
    await updateLead(upd);
    if (status === "pilot") celebrate("🎉 PILOT GEWONNEN! Der erste zahlende Kunde!");
    else if (status === "angebot") celebrate("💰 ANGEBOT RAUS! " + wer() + " liefert.");
    else toast("Status: " + SC[status].l + (upd._autoWV ? " · 🤖 WV " + upd._autoWV : ""));
    openModal(id); render();
  } catch(e) { toast("Fehler beim Speichern"); }
}

async function addNote(id) {
  const inp = document.getElementById("newnote");
  const note = inp.value.trim(); if (!note) return;
  try {
    await updateLead({id, note, wer: wer()});
    openModal(id); render();
  } catch(e) { toast("Fehler beim Speichern"); }
}

async function saveKontakt(id) {
  const body = {id, wer: wer()};
  for (const k of ["telefon","email","ansprechpartner","website","zustaendig","wiedervorlage"])
    body[k] = document.getElementById("f-"+k).value.trim();
  try {
    await updateLead(body);
    toast("Gespeichert"); render();
  } catch(e) { toast("Fehler beim Speichern"); }
}

const plusTage = n => new Date(Date.now() + n*864e5).toISOString().slice(0,10);
/* noCRM-Prinzip: kein Kontakt ohne nächsten Schritt — Auto-Wiedervorlage pro Ergebnis */
const LOG_WV = { "Nicht erreicht": 1, "AB, Nachricht hinterlassen": 2, "Gespräch geführt": 3, "Termin vereinbart!": 1 };

async function quickLog(id, text, status) {
  try {
    const body = {id, note: "📞 " + text, wer: wer()};
    if (status) body.status = status;
    if (LOG_WV[text]) body.wiedervorlage = plusTage(LOG_WV[text]);
    await updateLead(body);
    toast("Protokolliert: " + text + (LOG_WV[text] ? " · WV " + body.wiedervorlage : ""));
    openModal(id); render();
  } catch(e) { toast("Fehler beim Speichern"); }
}

/* ---------- Call-Modus (Close-Prinzip: im Fluss bleiben) ---------- */
let CM_QUEUE = [], CM_IDX = 0, CM_DONE = 0;

function buildQueue() {
  const me = wer(), seen = new Set(), q = [];
  const add = l => { if (!seen.has(l.id)) { seen.add(l.id); q.push(l); } };
  LEADS.filter(l => wvDue(l) && l.zustaendig === me).forEach(add);
  LEADS.filter(wvDue).forEach(add);
  LEADS.filter(warmDue).forEach(add);
  LEADS.filter(l => l.status === "call").forEach(add);
  // §143-Blindenwerkstätten mit Nummer dürfen legal kalt angerufen werden
  LEADS.filter(l => l.status === "offen" && l.telefon && is143(l)).forEach(add);
  return q.slice(0, 30);
}

function startCallMode() {
  CM_QUEUE = buildQueue(); CM_IDX = 0; CM_DONE = 0;
  document.getElementById("callmode").style.display = "block";
  renderCallMode();
}
function exitCallMode() {
  document.getElementById("callmode").style.display = "none";
  render();
}

/* 🎯 Maßgeschneiderter Gesprächsleitfaden pro Werkstatt — beratend, schließt mit offenen Fragen */

  const anlass = prods.map(p=>ANLASS[p]).find(Boolean) || "hochwertige, nachhaltige Firmengeschenke";
  const ortTxt = (l.ort && l.ort!=="?") ? `in ${l.ort}` : "bei Ihnen";
  const blind = is143(l);
  const ap = l.ansprechpartner ? ` (Ansprechpartner: ${esc(l.ansprechpartner)})` : "";

  return `
<div style="background:rgba(124,92,255,.08);border-left:3px solid #7c5cff;padding:10px 12px;border-radius:8px;margin-bottom:12px">
<b>Maßgeschneidert für ${esc(l.name)}${ap}</b><br>
<span style="font-size:12px">Produkte: ${esc(prods.join(", ")||"unbekannt — vorm Anruf Website checken")} · Anlass-Hook: <b style="color:var(--text)">${esc(anlass)}</b></span>
</div>

<b>1 · EINSTIEG</b> <span style="font-size:11px;color:var(--green)">(warm, ihr Produkt zuerst nennen)</span><br>
<span class="q">"Guten Tag, mein Name ist [DEIN NAME] von Werkstatt Digital. Ich rufe an, weil mir aufgefallen ist, dass Sie ${esc(ortTxt)} ${esc(pNenn)} in einer Qualität herstellen, die man heute kaum noch findet — und genau danach sucht der Markt für Firmengeschenke gerade händeringend. Haben Sie zwei Minuten?"</span>
${blind ? `<br><br><span style="font-size:12px;color:#a78bfa">💡 §143-Vorteil offen ansprechen:</span><br><span class="q">"Und weil Sie eine staatlich anerkannte Blindenwerkstatt sind, darf ich Sie dafür sogar direkt ansprechen — das ist gesetzlich ausdrücklich erlaubt, anders als bei normaler Werbung."</span>` : ""}
<br><br>

<b>2 · OFFENE FRAGEN</b> <span style="font-size:11px;color:var(--green)">(NICHT verkaufen — den Schmerz von ihm selbst aussprechen lassen)</span><br>
<span class="q">"Wie verkaufen Sie Ihre ${esc(p1)} heute an Firmen — läuft das aktiv, oder kommt das eher zufällig über Laufkundschaft?"</span><br><br>
<span class="q">"Angenommen, morgen will ein Unternehmen 300 Stück Ihrer ${esc(p1)} für die Weihnachtsfeier bestellen — über welchen Weg würde so eine Firma heute überhaupt zu Ihnen finden?"</span><br><br>
<span class="q">"Was glauben Sie — wie viel Umsatz geht Ihnen jedes Jahr verloren, einfach weil niemand bei Ihnen die Zeit hat, aktiv auf Firmen zuzugehen?"</span><br><br>
<span class="q">"Wenn so ein Firmenkanal auf dem Tisch läge — wer bei Ihnen würde darüber entscheiden?"</span><br><br>

<b>3 · DER REFRAME</b> <span style="font-size:11px;color:var(--green)">(erst NACHDEM der Schmerz da ist)</span><br>
<span class="q">"Genau da kommen wir rein: Sie produzieren weiter wie immer, wir bauen Ihre Firmenkundenseite, rufen aktiv Unternehmen an und bringen Ihnen die Aufträge. Für Ihre ${esc(p1)} heißt das konkret: ${esc(anlass)}. Kein Risiko und kein Aufwand für Ihr Team — Sie liefern nur."</span><br><br>

<b>4 · EINWÄNDE</b><br>
<span style="font-size:12px">▸ "Wir haben schon entia":</span> <span class="q">"entia ist Ihr Schaufenster für Privatkunden, die 2-3 Stück kaufen. Ich hole Ihnen Firmen, die 200 auf einmal bestellen. Anderer Kanal, kein Widerspruch."</span><br>
<span style="font-size:12px">▸ "Keine Zeit / kein Bedarf":</span> <span class="q">"Verstehe. Eine Frage noch: Wie viele neue Firmenkunden kamen letztes Jahr von allein zu Ihnen, ohne dass jemand sie angerufen hat?"</span><br>
<span style="font-size:12px">▸ "Wer sind Sie?":</span> <span class="q">"Ich baue Firmenvertrieb speziell für Werkstätten. Ich schick Ihnen gern vorher unsere Demo-Seite, dann sehen Sie sofort, was ich meine."</span><br><br>

<b>5 · ABSCHLUSS</b> <span style="font-size:11px;color:var(--green)">(offene Frage, die den nächsten Schritt einleitet)</span><br>
<span class="q">"Wenn Sie sich vorstellen, dass in einem halben Jahr regelmäßig Firmenaufträge für Ihre ${esc(p1)} reinkommen — was müsste ich Ihnen zeigen, damit Sie sagen: das testen wir?"</span><br>

function renderCallMode() {
  const cm = document.getElementById("callmode");
  if (CM_IDX >= CM_QUEUE.length) {
    cm.innerHTML = `<div class="cm-inner"><div class="cm-done">
      <div class="big">🏁</div><h2>Queue leer. ${CM_DONE} Anrufe geloggt.</h2>
      <p>Stark. Neue Leads in den Topf: Tab "Liste", Mails raus,<br>in 2 Tagen füllt sich die Queue von selbst.</p>
      <button class="cm-exit" style="margin-top:20px" onclick="exitCallMode()">Zurück zum CRM</button>
    </div></div>`;
    return;
  }
  const l = CM_QUEUE[CM_IDX];
  const grund = wvDue(l) ? "⏰ Wiedervorlage fällig" : warmDue(l) ? "🔥 Warm Call (Mail ist raus)" :
                l.status === "call" ? "☎️ Dranbleiben" : "§143: legaler Kaltanruf";
  const letzteNotiz = String(l.notizen||"").split(" | ").filter(Boolean).slice(-2);
  cm.innerHTML = `<div class="cm-inner">
    <div class="cm-top">
      <div class="cm-count">Lead <b>${CM_IDX+1}</b> / ${CM_QUEUE.length} · Geloggt heute: <b>${CM_DONE}</b></div>
      <button class="cm-exit" onclick="exitCallMode()">✕ Beenden</button>
    </div>
    <div class="cm-card">
      <div class="chips" style="margin:0 0 10px">
        <span class="chip warm">${grund}</span>
        ${is143(l) ? '<span class="chip b143">§143 legal</span>' : ""}
        <span class="chip">Score ${l.score}</span>
      </div>
      <div class="cm-name">${esc(l.name)}</div>
      <div class="cm-sub">
        ${esc(l.ort||"Ort unbekannt")}${l.bundesland ? " · " + esc(l.bundesland) : ""}<br>
        ${l.produkte ? "🛍 " + esc(l.produkte) : ""}
        ${l.ansprechpartner ? "<br>👤 " + esc(l.ansprechpartner) : ""}
        ${letzteNotiz.length ? "<br><br>📝 " + letzteNotiz.map(esc).join("<br>📝 ") : ""}
      </div>
      ${l.telefon ? `<a class="cm-tel" href="${telHref(l.telefon)}">📞 ${esc(l.telefon)}</a>`
                  : `<div class="cm-tel" style="background:var(--panel2);color:var(--dim)">Keine Nummer — recherchieren!</div>`}
      <input class="cm-note" id="cm-note" placeholder="Kurznotiz zum Anruf (optional) …">
      <div class="cm-log">
        <button class="b-no" onclick="cmLog('Nicht erreicht')">❌ Nicht erreicht<br><small>WV morgen</small></button>
        <button class="b-ab" onclick="cmLog('AB, Nachricht hinterlassen')">📼 AB<br><small>WV +2 Tage</small></button>
        <button class="b-talk" onclick="cmLog('Gespräch geführt','gespraech')">💬 Gespräch<br><small>WV +3 Tage</small></button>
        <button class="b-win" onclick="cmLog('Termin vereinbart!','gespraech')">📅 TERMIN!<br><small>WV morgen</small></button>
      </div>
      <button class="cm-skip" onclick="CM_IDX++; renderCallMode()">⏭ Überspringen</button>
    </div>
    <details class="cm-script" open>
      <summary>🎯 Gesprächsleitfaden — maßgeschneidert für diese Werkstatt</summary>
      <div class="s-body">${buildLeitfaden(l)}</div>
    </details>
  </div>`;
}

async function cmLog(text, status) {
  const l = CM_QUEUE[CM_IDX];
  const extra = document.getElementById("cm-note").value.trim();
  try {
    const body = {id: l.id, note: "📞 " + text + (extra ? " — " + extra : ""), wer: wer()};
    if (status) body.status = status;
    if (LOG_WV[text]) body.wiedervorlage = plusTage(LOG_WV[text]);
    await updateLead(body);
    CM_DONE++; CM_IDX++;
    if (/Termin vereinbart/i.test(text)) celebrate("📅 TERMIN! Stark, " + wer() + "!");
    else toast(text + " · nächster Lead");
    renderCallMode();
  } catch(e) { toast("Fehler beim Speichern"); }
}

async function copyMail(id) {
  await navigator.clipboard.writeText(document.getElementById("mailtext").textContent);
  const l = LEADS.find(x=>x.id===id);
  /* 🤖 Automation: Mail kopiert bei offenem Lead -> Status "mail" + Warm Call in 2 Tagen */
  if (l && l.status === "offen") {
    try {
      await updateLead({id, status: "mail", note: "🤖 Outreach-Mail kopiert", wer: wer()});
      toast("🤖 Mail kopiert · Status 'Mail raus' · Warm Call " + plusTage(2));
      openModal(id); render();
      return;
    } catch(e) {}
  }
  toast("Mail kopiert — Ansprechpartner checken, dann senden");
}

  if (!token() || document.getElementById("modal").style.display === "block") return;
  try { LEADS = await loadLeads(); render(); } catch(e){}
}, 60000);
</script>
